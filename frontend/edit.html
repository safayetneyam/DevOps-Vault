<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Snippet - DevOps Vault</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-muted: #475569;
            --text-soft: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
            --success: #15803d;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            /* Global horizontal breathing room so content never hugs
               the viewport edges. */
            padding: 0 5%;
        }

        header {
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            font-weight: 700;
        }

        header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        h2 {
            margin: 0 0 1rem;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="text"]:focus,
        select,
        textarea {
            width: 100%;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            padding: 0.65rem 0.8rem;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-color: transparent;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
            background-position:
                calc(100% - 18px) calc(50% - 2px),
                calc(100% - 13px) calc(50% - 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            padding-right: 2rem;
        }

        textarea {
            font-family: var(--mono);
            min-height: 220px;
            resize: vertical;
            white-space: pre;
            line-height: 1.45;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .field-row { grid-template-columns: 1fr; }
        }

        .actions {
            margin-top: 1.25rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            justify-content: flex-end;
        }

        /* Single source of truth for the form-button SHAPE. Both the
           primary submit ("Edit Snippet") and the Cancel anchor share
           these EXACT shape rules so they are pixel-identical except
           for color. Scoped to actual interactive form-button elements:
             - every real <button> (incl. type="submit")
             - anchors explicitly marked with .btn or .danger
           so the header logo / ghost links are NOT turned into buttons. */
        button,
        a.btn,
        a.danger {
            border: 0;
            border-radius: 6px;
            padding: 0.6rem 1.1rem;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.4;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        /* Primary (accent) variant — used by "Edit Snippet". */
        button.btn-primary,
        a.btn-primary,
        button[type="submit"] {
            background: var(--accent);
            color: #fff;
        }
        button.btn-primary:hover,
        button.btn-primary:focus,
        a.btn-primary:hover,
        a.btn-primary:focus,
        button[type="submit"]:hover,
        button[type="submit"]:focus {
            background: var(--accent-hover);
        }

        /* Header link-buttons (Home, + New Snippet, Admin, etc.) get
           the same accent-bordered ghost style across every page. */
        a.ghost,
        button.ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0.45rem 0.85rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }

        a.ghost:hover,
        button.ghost:hover { background: var(--accent); color: #fff; }

        /* Red solid-button style. Shares the EXACT same shape rules
           as the primary button so Cancel + Edit Snippet match
           pixel-for-pixel except for color. */
        a.danger,
        button.danger {
            background: var(--danger);
            color: #fff;
        }

        a.danger:hover,
        a.danger:focus,
        button.danger:hover,
        button.danger:focus { background: #b91c1c; color: #fff; }

        button:disabled { opacity: 0.6; cursor: progress; }

        #status {
            font-size: 0.9rem;
            color: var(--text-soft);
            margin-right: auto;
        }
        #status.ok { color: var(--success); }
        #status.err { color: var(--danger); }

        /* Loading state shown while we fetch the snippet. */
        #loading {
            color: var(--text-soft);
            font-style: italic;
            padding: 0.5rem 0;
        }
        #form-card.hidden { display: none; }

        /* --------------------------------------------------------------
           Vault password modal. Replaces window.prompt() so the user
           types into a <input type="password"> field that masks the
           value as bullets — the vault password must never appear in
           plain text on screen or in a recording.
           -------------------------------------------------------------- */
        #vault-pw-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
        }
        #vault-pw-modal[hidden] { display: none; }
        #vault-pw-modal .pw-dialog {
            width: min(420px, calc(100vw - 32px));
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        #vault-pw-modal .pw-reason {
            color: var(--text);
            font-size: 14px;
            line-height: 1.45;
            margin: 0 0 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #vault-pw-modal .pw-input {
            width: 100%;
            padding: 9px 11px;
            font-size: 15px;
            font-family: var(--mono);
            color: var(--text);
            background: var(--surface-alt);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            outline: none;
        }
        #vault-pw-modal .pw-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
        }
        #vault-pw-modal .pw-hint {
            color: var(--text-soft);
            font-size: 12px;
            margin: 10px 0 0;
        }
        #vault-pw-modal .pw-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }
        #vault-pw-modal .pw-actions button {
            font-size: 14px;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
        }
        #vault-pw-modal .pw-actions .pw-ok {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        #vault-pw-modal .pw-actions .pw-ok:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        #vault-pw-modal .pw-error .pw-reason {
            color: var(--danger);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Masked vault-password modal. Replaces window.prompt() so the
         password is rendered as bullets instead of plaintext. See
         promptVaultPassword() below for the lifecycle. -->
    <div id="vault-pw-modal" role="dialog" aria-modal="true"
         aria-labelledby="vault-pw-reason" hidden>
        <div class="pw-dialog">
            <p id="vault-pw-reason" class="pw-reason"></p>
            <input id="vault-pw-input" class="pw-input"
                   type="password" autocomplete="off"
                   autocapitalize="off" autocorrect="off"
                   spellcheck="false" />
            <p class="pw-hint">Leave blank and press OK to cancel.</p>
            <div class="pw-actions">
                <button type="button" class="pw-cancel">Cancel</button>
                <button type="button" class="pw-ok">OK</button>
            </div>
        </div>
    </div>

    <header>
        <h1>
            <a href="/" style="color: inherit; text-decoration: none;">
                DevOps <span>Vault</span>
            </a>
        </h1>
        <div class="header-actions">
            <a href="/temp-admin/" class="ghost" role="button">&larr; Back to Admin</a>
        </div>
    </header>

    <main>
        <section class="card">
            <h2 id="form-heading">Edit Snippet</h2>

            <p id="loading">Loading snippet&hellip;</p>

            <form id="edit-form" class="hidden" autocomplete="off" novalidate>
                <div class="field">
                    <label for="f-title">Title</label>
                    <input type="text" id="f-title" name="title" required maxlength="255" placeholder="Force Delete K8s Namespace">
                </div>
                <div class="field">
                    <label for="f-code">Code Body</label>
                    <textarea id="f-code" name="code_body" required spellcheck="false"
                              placeholder="kubectl delete ns foo --force --grace-period=0"></textarea>
                </div>
                <div class="field-row">
                    <div class="field">
                    <label for="f-tool">Tool</label>
                    <!-- <select> populated at load time from the Tool
                         registry (GET /api/snippets/tools/). Falls back
                         to a built-in default list if the registry is
                         empty or unreachable. -->
                    <select id="f-tool" name="tool" required>
                        <option value="" disabled>Select a tool&hellip;</option>
                    </select>
                </div>
                    <div class="field">
                        <label for="f-tags">Tags (comma-separated)</label>
                        <input type="text" id="f-tags" name="tags"
                               placeholder="k8s, cleanup"
                               autocomplete="off">
                    </div>
                </div>
                <div class="actions">
                    <span id="status" aria-live="polite"></span>
                    <a href="/temp-admin/" class="danger">Cancel</a>
                    <button type="submit" id="save-btn">Edit Snippet</button>
                </div>
            </form>
        </section>
    </main>

    <script>
    (function () {
        "use strict";

        // --------------------------------------------------------------
        // Extract the snippet ID from the URL: /edit/<id>/
        // --------------------------------------------------------------
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        // pathParts looks like ["edit", "<id>"] for /edit/12/
        const snippetId = parseInt(pathParts[pathParts.length - 1], 10);

        const API_DETAIL = "/api/snippets/" + snippetId + "/";
        // Public registry endpoint that lists every Tool/Stack known to
        // the system, including ones with zero snippets. The dropdown
        // below is populated from this list (with a built-in fallback
        // when the request fails or returns nothing).
        const API_TOOLS = "/api/snippets/tools/";

        // Shown inside the tool/stack <select> when the registry is
        // empty (no stacks have been added by the admin yet) so the
        // user understands why the dropdown is not populated.
        const EMPTY_REGISTRY_MESSAGE =
            "No Tool Exists to Choose";

        const els = {
            loading: document.getElementById("loading"),
            form: document.getElementById("edit-form"),
            heading: document.getElementById("form-heading"),
            title: document.getElementById("f-title"),
            code: document.getElementById("f-code"),
            tool: document.getElementById("f-tool"),
            tags: document.getElementById("f-tags"),
            saveBtn: document.getElementById("save-btn"),
            status: document.getElementById("status"),
        };

        function setStatus(msg, kind) {
            els.status.textContent = msg || "";
            els.status.className = kind || "";
        }

        /**
         * Ask the user for the shared vault password via the masked
         * modal in the DOM. Returns the trimmed password on success,
         * or ``null`` if the user cancelled or left the field blank.
         * Per the spec, every save re-prompts (no session unlock).
         *
         * The native ``window.prompt()`` displays the value in
         * plaintext, which would leak the vault password to anyone
         * watching the screen. The custom modal uses
         * ``<input type="password">`` so the keystrokes render as
         * bullets, and it accepts Esc / Enter so muscle memory still
         * works.
         *
         * If the modal markup is missing for any reason (older cached
         * HTML, partial DOM injection, etc.) we fall back to
         * ``window.prompt`` so the page never becomes unable to write.
         */
        function promptVaultPassword(reason) {
            const modal = document.getElementById("vault-pw-modal");
            const input = document.getElementById("vault-pw-input");
            const reasonEl = document.getElementById("vault-pw-reason");
            const okBtn = modal && modal.querySelector(".pw-ok");
            const cancelBtn = modal && modal.querySelector(".pw-cancel");

            // Defensive fallback: if the modal markup is not in the
            // DOM (e.g. an older cached page served without it), fall
            // back to the old plaintext window.prompt so writes still
            // work — they just won't be masked. Better than a silent
            // broken page.
            if (!modal || !input || !reasonEl || !okBtn || !cancelBtn) {
                const pw = window.prompt(
                    (reason || "Enter the vault password:") + "\n\n"
                        + "Leave blank and press OK to cancel."
                );
                if (pw === null) return Promise.resolve(null);
                return Promise.resolve(pw.trim() || null);
            }

            return new Promise((resolve) => {
                let resolved = false;

                function done(value) {
                    if (resolved) return;
                    resolved = true;
                    modal.hidden = true;
                    modal.classList.remove("pw-error");
                    input.value = "";
                    okBtn.removeEventListener("click", onOk);
                    cancelBtn.removeEventListener("click", onCancel);
                    input.removeEventListener("keydown", onKey);
                    modal.removeEventListener("click", onBackdrop);
                    document.removeEventListener("keydown", onEsc);
                    resolve(value);
                }

                function onOk() { done(input.value.trim() || null); }
                function onCancel() { done(null); }
                function onBackdrop(e) {
                    // Click outside the dialog (on the overlay itself)
                    // cancels — mirrors how most native dialogs behave.
                    if (e.target === modal) done(null);
                }
                function onKey(e) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        done(input.value.trim() || null);
                    }
                }
                function onEsc(e) {
                    if (e.key === "Escape") {
                        e.preventDefault();
                        done(null);
                    }
                }

                // Render this attempt's reason + reset any prior error
                // colouring from a previous wrong-password prompt.
                reasonEl.textContent =
                    (reason || "Enter the vault password:") + "\n\n"
                        + "Leave blank and press OK to cancel.";
                modal.classList.remove("pw-error");

                okBtn.addEventListener("click", onOk);
                cancelBtn.addEventListener("click", onCancel);
                input.addEventListener("keydown", onKey);
                modal.addEventListener("click", onBackdrop);
                document.addEventListener("keydown", onEsc);

                modal.hidden = false;
                // Defer focus until the dialog is visible so the
                // cursor lands in the input and the soft keyboard (on
                // touch devices) is ready.
                setTimeout(() => { input.focus(); input.select(); }, 0);
            });
        }

        /**
         * Run a mutating fetch that carries the X-Vault-Password header
         * and re-prompts the user with a warning if the server rejects
         * the password (HTTP 403).
         *
         * The vault uses a custom header — it is NOT HTTP Basic auth —
         * so we deliberately reject with 403 and no
         * ``WWW-Authenticate`` header. Without that header the browser
         * does NOT pop its native username/password dialog. This helper
         * catches the 403, re-prompts with a "Wrong vault password"
         * warning (still a single-password prompt, no username field),
         * and keeps re-prompting until the user enters the correct
         * password OR cancels the prompt (there is no attempt cap).
         *
         * Returns the parsed JSON body on success, ``null`` if the user
         * cancelled the prompt, or throws on any non-403 server error.
         */
        async function sendVaultWrite({
            url, body, method, passwordReason,
            wrongReason = "Wrong vault password. Please try again.",
            onWrong,                                        // optional: called after every 403 so the caller can flash an error while the next prompt is up
            onCancel,                                       // optional: called once when the user cancels the prompt, so the caller can wipe the red wrong-password text
        }) {
            for (let attempt = 1; ; attempt++) {
                const password = await promptVaultPassword(
                    attempt === 1
                        ? passwordReason
                        : (wrongReason + "\n\n" + passwordReason)
                );
                if (!password) {
                    // User cancelled. Give the caller a chance to
                    // wipe any red "Wrong vault password" text it
                    // flashed via ``onWrong`` so the page doesn't
                    // stay on the error state after a cancel.
                    if (typeof onCancel === "function") {
                        try { onCancel(); } catch (_) { /* ignore */ }
                    }
                    return null;
                }

                const res = await fetch(url, {
                    method,
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "X-Vault-Password": password,
                    },
                    body: body !== undefined && body !== null
                        ? JSON.stringify(body)
                        : undefined,
                });

                if (res.ok) {
                    return res.json();
                }
                if (res.status !== 403) {
                    const txt = await res.text();
                    throw new Error("HTTP " + res.status + ": " + txt);
                }
                // 403 = bad password. Let the caller flash an error
                // in its UI *before* the next prompt appears so the
                // user has feedback that the previous attempt failed.
                if (typeof onWrong === "function") {
                    try { onWrong(wrongReason); } catch (_) { /* ignore */ }
                }
                // No upper bound on attempts; the loop only exits via
                // ``return null`` (user cancelled) or
                // ``return res.json()`` (success).
            }
        }

        // Defense-in-depth: even though the model.save() normalizes,
        // we lowercase tags here so the wire payload is canonical.
        function normalizeTags(raw) {
            return raw
                .split(/[,\s]+/)
                .map((t) => t.trim().toLowerCase())
                .filter(Boolean)
                .filter((t, i, arr) => arr.indexOf(t) === i)
                .join(", ");
        }

        // --------------------------------------------------------------
        // Bail out cleanly if the URL didn't carry a usable id.
        // --------------------------------------------------------------
        if (!Number.isFinite(snippetId) || snippetId <= 0) {
            els.loading.textContent =
                "Invalid snippet ID in URL. Open this page from the admin table.";
            return;
        }

        // --------------------------------------------------------------
        // Populate the Tools/Stack <select> from the registry. The
        // registry is the single source of truth — any Tool the admin
        // added via the sidebar appears here, and any Tool the admin
        // deleted disappears from here too. If the API returns an
        // empty list OR fails, the dropdown shows a single disabled
        // "No Stack or Tool Exists to Choose" entry instead of falling
        // back to a built-in default list, so the user always sees
        // exactly what's been registered. The snippet's current
        // value (if any) is re-selected by loadSnippet().
        async function loadToolOptions() {
            let names = [];
            let apiReached = false;
            try {
                const res = await fetch(API_TOOLS, {
                    headers: { "Accept": "application/json" },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data.tools)) {
                        names = data.tools;
                    }
                    apiReached = true;
                }
            } catch (err) {
                // Network / parse failure -> empty-state UI below.
            }

            // Rebuild the <select> from scratch, keeping the original
            // placeholder as the first child so the markup stays
            // valid; we replace its label dynamically to match the
            // current registry state.
            const select = els.tool;
            const placeholder = select.options[0];
            select.innerHTML = "";
            select.appendChild(placeholder);

            if (!names.length) {
                // Empty registry (or API unreachable): turn the
                // placeholder into the empty-state message, leave it
                // disabled so the user can't submit an empty form,
                // and disable the <select> entirely so it reads as
                // read-only feedback rather than an active dropdown.
                placeholder.textContent =
                    apiReached
                        ? EMPTY_REGISTRY_MESSAGE
                        : "Unable to load tools. Retry later.";
                placeholder.disabled = true;
                placeholder.selected = true;
                select.disabled = true;
                return;
            }

            select.disabled = false;
            placeholder.textContent = "Select a tool\u2026";
            placeholder.disabled = true;
            // Do NOT mark the placeholder as selected here — we
            // haven't read the snippet yet, and a later
            // `loadSnippet()` will pick the right registry option.
            // Pre-selecting the placeholder would race against that
            // pass and leave the dropdown showing "Select a tool…"
            // when the snippet clearly has a known tool.
            placeholder.selected = false;

            names.forEach((n) => {
                const opt = document.createElement("option");
                opt.value = n;
                opt.textContent = n;
                select.appendChild(opt);
            });
        }

        // Fetch the snippet and pre-fill the form.
        // --------------------------------------------------------------
        async function loadSnippet() {
            try {
                const res = await fetch(API_DETAIL, {
                    headers: { "Accept": "application/json" },
                });
                if (res.status === 404) {
                    els.loading.textContent =
                        "Snippet #" + snippetId + " was not found.";
                    return;
                }
                if (!res.ok) {
                    throw new Error("HTTP " + res.status);
                }
                const snippet = await res.json();

                // Pre-fill every field. Tool names preserve user-supplied
                // casing on both the registry and the snippet, so the
                // API value comes back verbatim.
                els.title.value = snippet.title || "";
                els.code.value = snippet.code_body || "";

                // Match the option whose value equals the snippet's
                // tool. Comparison is case-insensitive so a snippet
                // stored as "jenkins" still resolves to the "Jenkins"
                // registry option (and vice versa). If none matches
                // (the tool was deleted from the registry, etc.), we
                // append a new option so the user can still see +
                // edit it — but only after checking there's no
                // case-fold duplicate already present.
                const tool = (snippet.tool || "").trim();

                // Wipe any prior `selected` (the placeholder may
                // have been marked selected before we knew which
                // tool the snippet is on) so the dropdown reflects
                // exactly one chosen option after we set ours.
                for (const opt of els.tool.options) {
                    opt.selected = false;
                }

                let matched = false;
                for (const opt of els.tool.options) {
                    if (opt.value.toLowerCase() === tool.toLowerCase()) {
                        opt.selected = true;
                        matched = true;
                    }
                }
                if (!matched && tool) {
                    // Don't append if any existing option is already
                    // the same tool under different casing — that
                    // would just duplicate the dropdown row.
                    let already = false;
                    for (const opt of els.tool.options) {
                        if (opt.value.toLowerCase() === tool.toLowerCase()) {
                            opt.selected = true;
                            already = true;
                            break;
                        }
                    }
                    if (!already) {
                        const opt = document.createElement("option");
                        opt.value = tool;
                        opt.textContent = tool;
                        opt.selected = true;
                        els.tool.appendChild(opt);
                    }
                }

                els.tags.value = snippet.tags || "";

                // Reveal the form, hide the loading line.
                els.loading.hidden = true;
                els.form.classList.remove("hidden");
                els.heading.textContent =
                    "Edit Snippet #" + snippet.id + " \u2014 " + (snippet.title || "");
            } catch (err) {
                els.loading.textContent = "Failed to load: " + err.message;
            }
        }

        // --------------------------------------------------------------
        // Submit handler: PUT the form back to the API.
        // --------------------------------------------------------------
        els.form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                title: els.title.value.trim(),
                code_body: els.code.value,
                tool: els.tool.value.trim(),
                tags: normalizeTags(els.tags.value),
            };
            if (!payload.title || !payload.code_body) {
                setStatus("Title and Code Body are required.", "err");
                return;
            }
            if (!payload.tool) {
                setStatus("Please choose a tool value.", "err");
                return;
            }

            // Vault write-protection: ``sendVaultWrite`` handles the
            // prompt AND the 403-retry-with-warning loop, so this
            // handler only owns the save-button state and status text.
            els.saveBtn.disabled = true;
            setStatus("Editing...", "");
            try {
                const updated = await sendVaultWrite({
                    url: API_DETAIL,
                    method: "PUT",
                    body: payload,
                    passwordReason:
                        "Enter the vault password to save changes:",
                    // The vault password modal already displays the
                    // "Wrong vault password" warning inside itself
                    // on every retry, so the page-level status line
                    // is intentionally left untouched for password
                    // failures — only success / failure of the final
                    // request is reported there (by the caller below).
                });
                if (!updated) {                    // user cancelled the prompt
                    els.saveBtn.disabled = false;
                    // Clear the "Editing..." status so cancelling
                    // the password prompt doesn't leave the page
                    // looking like a save is still in progress.
                    setStatus("", "");
                    return;
                }
                setStatus(
                    "Saved \"" + (updated.title || "") + "\". Redirecting...",
                    "ok"
                );
                // Brief pause so the user sees the confirmation, then
                // bounce back to the admin table.
                setTimeout(() => {
                    window.location.href = "/temp-admin/";
                }, 500);
            } catch (err) {
                setStatus("Save failed: " + err.message, "err");
                els.saveBtn.disabled = false;
            }
        });

        // Populate the tool <select> from the registry BEFORE
        // loadSnippet() runs so its matching loop sees the real
        // option list (not just the placeholder). Running these in
        // parallel would race: loadSnippet could resolve its fetch
        // first, find no matching option in an under-construction
        // <select>, and append a duplicate fallback option that
        // already exists in the registry.
        // loadToolOptions().then(loadSnippet) keeps the DOM and
        // the selection deterministic.
        loadToolOptions().then(loadSnippet);
    })();
    </script>
</body>
</html>
