<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DevOps Vault</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-muted: #475569;
            --text-soft: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #dbeafe;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --success: #15803d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            /* Global horizontal breathing room so content never hugs
               the viewport edges. */
            padding: 0 5%;
        }

        header {
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            /* Anchor for the absolutely-positioned #status so it
               can sit visually centred between the title and the
               home button on wide screens. */
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            font-weight: 700;
        }

        header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #status {
            font-size: 0.85rem;
            color: var(--text-soft);
            min-height: 1.2em;
            /* Hidden by default: the header on first load should
               show only the title and the home button (no blank
               reserved space for an empty message). setStatus()
               sets display="" when there's a real message and
               display="none" again when it auto-dismisses. */
            display: none;
            /* On wide screens the status line floats in the
               middle of the header (between the title on the
               left and the home button on the right). The
               narrow-screen media query flips it back into
               the normal flow so it stacks vertically with
               the title and the button. */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            max-width: 60%;
            pointer-events: none;
        }
        #status.ok { color: var(--success); }
        #status.err { color: var(--danger); }

        /* Header link-buttons (Home, + New Snippet, Admin, etc.) get
           the same accent-bordered ghost style across every page. */
        a.ghost,
        button.ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0.45rem 0.85rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }
        a.ghost:hover,
        button.ghost:hover,
        a.ghost:focus,
        button.ghost:focus { background: var(--accent); color: #fff; }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .toolbar h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        /* Delete button is disabled when zero items are selected. */
        #delete-btn {
            background: var(--danger);
            color: #fff;
            border: 0;
            border-radius: 6px;
            padding: 0.55rem 1rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #delete-btn:hover:not(:disabled) { background: var(--danger-hover); }
        #delete-btn:disabled {
            background: var(--surface-alt);
            color: var(--text-soft);
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 0.7rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.92rem;
        }

        /* Center the only header column we actually use (the checkbox). */
        thead th {
            background: var(--surface-alt);
            text-align: center;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            width: 60px;
        }

        /* Make the checkbox column narrow and center-aligned. */
        td.col-check { text-align: center; width: 60px; }
        td.col-title { word-break: break-word; }
        td.col-edit  { text-align: right; width: 80px; }

        /* The GROUP HEADER row spans all 3 columns, centered. */
        tr.group-header td {
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
            padding: 0.55rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr.data-row:hover { background: var(--surface-alt); }

        /* The "select all in group" header checkbox visual aid. */
        tr.group-header td .group-select {
            margin-right: 0.5rem;
            accent-color: var(--accent);
        }

        input[type="checkbox"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        a.edit-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        a.edit-link:hover { text-decoration: underline; }

        .empty-state {
            text-align: center;
            color: var(--text-soft);
            font-style: italic;
            padding: 2rem 1rem;
        }

        .loading, .error {
            text-align: center;
            padding: 1rem;
            color: var(--text-soft);
            font-style: italic;
        }
        .error { color: var(--danger); font-style: normal; }

        /* --------------------------------------------------------------
           Admin layout: 1/4 sidebar (Manage Tools/Stacks) + 3/4 table.
           Uses CSS grid so the two columns stay locked to that ratio
           regardless of how wide the viewport gets.
           -------------------------------------------------------------- */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 1.25rem;
            align-items: start;
        }

        /* The left sidebar listing unique Tools/Stacks. */
        #tools-sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            position: sticky;
            top: 1rem;
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
        }

        #tools-sidebar h2 {
            margin: 0 0 0.5rem 0;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #tools-sidebar .sidebar-hint {
            font-size: 0.78rem;
            color: var(--text-soft);
            margin: 0 0 0.85rem 0;
        }

        #tools-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #tools-list li.tool-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.55rem 0.65rem;
            border-radius: 6px;
            border: 1px solid transparent;
        }
        #tools-list li.tool-row:hover {
            background: var(--surface-alt);
            border-color: var(--border);
        }

        #tools-list .tool-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text);
            flex: 1 1 auto;
            min-width: 0;
            word-break: break-word;
        }

        /* Inline-edit input replaces .tool-name when user clicks Edit. */
        #tools-list .tool-edit-input {
            flex: 1 1 auto;
            min-width: 0;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            padding: 0.3rem 0.45rem;
            border: 1px solid var(--accent);
            border-radius: 5px;
            background: #fff;
            color: var(--text);
        }

        #tools-list .tool-count {
            font-size: 0.75rem;
            color: var(--text-soft);
            background: var(--surface-alt);
            padding: 0.1rem 0.45rem;
            border-radius: 999px;
            margin-left: 0.25rem;
            flex: 0 0 auto;
        }

        #tools-list .tool-actions {
            display: flex;
            gap: 0.25rem;
            flex: 0 0 auto;
        }

        /* Tiny icon-style buttons used inside the sidebar. */
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 5px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            padding: 0;
            font-family: inherit;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
        .icon-btn.danger { color: var(--danger); border-color: var(--border); }
        .icon-btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
        .icon-btn.save { color: var(--success); }
        .icon-btn.save:hover { background: var(--success); color: #fff; border-color: var(--success); }
        .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .sidebar-empty {
            text-align: center;
            color: var(--text-soft);
            font-style: italic;
            font-size: 0.85rem;
            padding: 0.75rem 0.5rem;
        }

        /* --------------------------------------------------------------
           "Add Stack" row at the top of the sidebar. Visually matches
           the per-tool rows (same .tool-row chrome + icon-btn), but its
           only button is the "+" add icon. When clicked, it transforms
           into an inline input + Tick/Cross mirroring enterEditMode.
           -------------------------------------------------------------- */
        #tools-list li.tool-row.add-row {
            /* Slightly muted so the row reads as an action, not data. */
            border-style: dashed;
            border-color: var(--border);
        }
        #tools-list li.tool-row.add-row:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
        }
        /* While the Add row is in edit mode (input + Tick/Cross), the
           surrounding dashed chrome reads as a 4th bordered box and
           stacks on top of the input/tick/cross borders, making the
           row look like four independent cells. Drop the outer border
           during edit so the row is a single inline form. */
        #tools-list li.tool-row.add-row.editing {
            border-style: solid;
            border-color: var(--border);
            background: var(--surface-alt);
        }
        /* The outer dashed chrome is only there to advertise "+ Add
           Stack" as an actionable row. While we're in edit mode hide
           its dashed chrome entirely so the input + Tick/Cross sit
           cleanly side-by-side without an extra rectangle wrapping
           them. */
        #tools-list li.tool-row.add-row.editing {
            border-color: transparent;
            background: transparent;
        }
        /* Same input style used by the rename flow, reused here. */
        #tools-list .tool-add-input {
            flex: 1 1 auto;
            min-width: 0;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            padding: 0.3rem 0.45rem;
            border: 1px solid var(--accent);
            border-radius: 5px;
            background: #fff;
            color: var(--text);
        }

        /* On narrower screens, stack the two columns vertically
           so the sidebar isn't crushed. */
        @media (max-width: 800px) {
            .admin-grid { grid-template-columns: 1fr; }
            #tools-sidebar { position: static; max-height: none; }
        }

        /* On narrow screens the header switches from the
           "title | status | home" side-by-side layout to a
           vertical stack: title first, status message
           underneath, then the home button. The status is
           un-anchored from its absolute positioning so it
           flows in the natural document order between them. */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
                padding: 0.85rem 1rem;
            }

            header h1 {
                text-align: center;
                font-size: 1.25rem;
            }

            .header-actions {
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.6rem;
            }

            #status {
                position: static;
                transform: none;
                text-align: center;
                max-width: none;
                pointer-events: auto;
                /* The mobile layout uses the normal document flow
                   (no absolute positioning), so setStatus() needs
                   to swap display between "" and "none" so the
                   message appears in the right spot without ever
                   reserving blank vertical space. */
                display: none;
            }
        }

        /* --------------------------------------------------------------
           Vault password modal. Replaces window.prompt() so the user
           types into a <input type="password"> field that masks the
           value as bullets — the vault password must never appear in
           plain text on screen or in a recording.
           -------------------------------------------------------------- */
        #vault-pw-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
        }
        #vault-pw-modal[hidden] { display: none; }
        #vault-pw-modal .pw-dialog {
            width: min(420px, calc(100vw - 32px));
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        #vault-pw-modal .pw-reason {
            color: var(--text);
            font-size: 14px;
            line-height: 1.45;
            margin: 0 0 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #vault-pw-modal .pw-input {
            width: 100%;
            padding: 9px 11px;
            font-size: 15px;
            font-family: var(--mono);
            color: var(--text);
            background: var(--surface-alt);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            outline: none;
        }
        #vault-pw-modal .pw-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
        }
        #vault-pw-modal .pw-hint {
            color: var(--text-soft);
            font-size: 12px;
            margin: 10px 0 0;
        }
        #vault-pw-modal .pw-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }
        #vault-pw-modal .pw-actions button {
            font-size: 14px;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
        }
        #vault-pw-modal .pw-actions .pw-ok {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        #vault-pw-modal .pw-actions .pw-ok:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        #vault-pw-modal .pw-error .pw-reason {
            color: var(--danger);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Masked vault-password modal. Replaces window.prompt() so the
         password is rendered as bullets instead of plaintext. See
         promptVaultPassword() below for the lifecycle. -->
    <div id="vault-pw-modal" role="dialog" aria-modal="true"
         aria-labelledby="vault-pw-reason" hidden>
        <div class="pw-dialog">
            <p id="vault-pw-reason" class="pw-reason"></p>
            <input id="vault-pw-input" class="pw-input"
                   type="password" autocomplete="off"
                   autocapitalize="off" autocorrect="off"
                   spellcheck="false" />
            <p class="pw-hint">Leave blank and press OK to cancel.</p>
            <div class="pw-actions">
                <button type="button" class="pw-cancel">Cancel</button>
                <button type="button" class="pw-ok">OK</button>
            </div>
        </div>
    </div>

    <header>
        <h1>
            <a href="/" style="color: inherit; text-decoration: none;">
                DevOps <span>Vault</span>
            </a>
        </h1>
        <!-- Status lives OUTSIDE .header-actions so it can be
             absolutely centred in the header bar on wide screens
             without being grouped with the home button. The
             narrow-screen media query flips it back into the
             normal flow so the title, status, and home button
             stack vertically in that order. -->
        <span id="status" aria-live="polite"></span>
        <div class="header-actions">
            <a href="/" class="ghost" role="button">&larr; Home</a>
        </div>
    </header>

    <main>
        <div class="admin-grid">
            <!-- 1/4: Manage Tools sidebar -->
            <aside id="tools-sidebar" aria-label="Manage tools">
                <h2>Manage Tools</h2>
                <p class="sidebar-hint">Each row is a unique tool. Edit to rename across all snippets, or delete to remove the entire group.</p>
                <ul id="tools-list">
                    <li class="tool-row add-row" id="add-tool-row" aria-label="Add a new tool">
                        <span class="tool-name add-label">+ Add Tool</span>
                        <span class="tool-actions">
                            <button type="button" class="icon-btn add-btn"
                                    title="Add a new tool"
                                    aria-label="Add a new tool">+</button>
                        </span>
                    </li>
                    <li class="sidebar-empty">Loading tools...</li>
                </ul>
            </aside>

            <!-- 3/4: existing snippets table -->
            <section>
                <div class="toolbar">
                    <h2>All Snippets</h2>
                    <button type="button" id="delete-btn" disabled>Delete 0 Item(s)</button>
                </div>

                <div id="table-wrap">
                    <p class="loading">Loading snippets...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
    (function () {
        "use strict";

        const API_LIST = "/api/snippets/";
        const API_BATCH = "/api/snippets/batch-delete/";
        const API_BULK_RENAME = "/api/snippets/bulk-rename-tool/";
        // Tool/Stack registry endpoints. The registry is a real DB
        // table (see Tool model), so create/delete here are the only
        // source of truth — no more deriving the list from snippets.
        const API_TOOLS_LIST = "/api/snippets/tools/";           // GET: registry
        const API_TOOLS_CREATE = "/api/snippets/tools/create/";  // POST: add new
        const API_TOOLS_DELETE = (name) =>
            "/api/snippets/tools/" + encodeURIComponent(name) + "/";  // DELETE: remove
        // Legacy bulk-delete-tool endpoint is no longer used; left here
        // as a reminder during the migration. Safe to delete later.
        // const API_BULK_DELETE_TOOL = "/api/snippets/bulk-delete-tool/";

        const els = {
            status: document.getElementById("status"),
            tableWrap: document.getElementById("table-wrap"),
            deleteBtn: document.getElementById("delete-btn"),
            toolsList: document.getElementById("tools-list"),
        };

        // Cache the last-loaded snippet array so the sidebar can derive
        // its tool list + counts from the same source of truth as the
        // table, without an extra API call.
        let lastSnippets = [];

        // Cache the registry of Tools/Stacks the admin has pre-created
        // via the "Add Stack" button. These rows can have zero snippets
        // and still appear in the sidebar so the admin sees (and can
        // delete) tool names they registered before any snippet existed.
        let lastTools = [];

        // Set of currently-checked snippet IDs (across all groups).
        let checkedIds = new Set();

        // Single in-flight status timer so successive setStatus()
        // calls don't leave behind a stale clearTimeout() that
        // erases a fresher message. Reset on every call.
        // ``lastStatusMsg`` tracks what we most recently displayed
        // so the timer callback can decide whether it's still safe
        // to auto-dismiss (a newer setStatus() call should always
        // win over a stale timer that hasn't been cancelled yet).
        let statusClearTimer = null;
        let lastStatusMsg = null;

        function setStatus(msg, kind) {
            els.status.textContent = msg || "";
            els.status.className = kind || "";
            // The #status element has display:none by default (see CSS)
            // so the header on first load shows only the title and the
            // home button. When a real message arrives we MUST set an
            // explicit display value (here we use "inline-block") — if
            // we cleared the inline style with `style.display = ""` the
            // CSS default `display: none` would take over and the
            // message would never appear. Hide again after auto-clear.
            els.status.style.display = msg ? "inline-block" : "none";
            if (statusClearTimer !== null) {
                clearTimeout(statusClearTimer);
                statusClearTimer = null;
            }
            lastStatusMsg = msg || null;
            // Auto-dismiss success / info messages after 5 seconds so
            // the header doesn't stay cluttered with confirmation text
            // ("Deleted N snippet(s)." etc.) after the action is done.
            // Errors stay until the next setStatus() so the user has
            // time to read them and act on the failure.
            if (msg && kind !== "err") {
                statusClearTimer = setTimeout(() => {
                    // Only clear if our message is still the latest one
                    // shown — guards against a race where a newer
                    // setStatus() call has replaced it (e.g. an error
                    // reported after a successful action).
                    if (lastStatusMsg === msg) {
                        els.status.textContent = "";
                        els.status.className = "";
                        els.status.style.display = "none";
                        lastStatusMsg = null;
                    }
                    statusClearTimer = null;
                }, 5000);
            }
        }

        /**
         * Ask the user for the shared vault password.
         * Returns the trimmed password string on success, or ``null`` if
         * the user cancelled / left the field blank. Every destructive
         * action on this page funnels through here so the UI is
         * consistent and so the password is never reused across saves
         * (the spec is "re-prompt on every save", no session unlock).
         */
        function promptVaultPassword(reason) {
            const modal = document.getElementById("vault-pw-modal");
            const input = document.getElementById("vault-pw-input");
            const reasonEl = document.getElementById("vault-pw-reason");
            const okBtn = modal && modal.querySelector(".pw-ok");
            const cancelBtn = modal && modal.querySelector(".pw-cancel");

            // Defensive fallback: if the modal markup is not in the
            // DOM (e.g. an older cached page served without it), fall
            // back to the old plaintext window.prompt so writes still
            // work — they just won't be masked. Better than a silent
            // broken page.
            if (!modal || !input || !reasonEl || !okBtn || !cancelBtn) {
                const pw = window.prompt(
                    (reason || "Enter the vault password:") + "\n\n"
                        + "Leave blank and press OK to cancel."
                );
                if (pw === null) return Promise.resolve(null);
                return Promise.resolve(pw.trim() || null);
            }

            return new Promise((resolve) => {
                let resolved = false;

                function done(value) {
                    if (resolved) return;
                    resolved = true;
                    modal.hidden = true;
                    modal.classList.remove("pw-error");
                    input.value = "";
                    okBtn.removeEventListener("click", onOk);
                    cancelBtn.removeEventListener("click", onCancel);
                    input.removeEventListener("keydown", onKey);
                    modal.removeEventListener("click", onBackdrop);
                    document.removeEventListener("keydown", onEsc);
                    resolve(value);
                }

                function onOk() { done(input.value.trim() || null); }
                function onCancel() { done(null); }
                function onBackdrop(e) {
                    // Click outside the dialog (on the overlay itself)
                    // cancels — mirrors how most native dialogs behave.
                    if (e.target === modal) done(null);
                }
                function onKey(e) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        done(input.value.trim() || null);
                    }
                }
                function onEsc(e) {
                    if (e.key === "Escape") {
                        e.preventDefault();
                        done(null);
                    }
                }

                // Render this attempt's reason + reset any prior error
                // colouring from a previous wrong-password prompt.
                reasonEl.textContent =
                    (reason || "Enter the vault password:") + "\n\n"
                        + "Leave blank and press OK to cancel.";
                modal.classList.remove("pw-error");

                okBtn.addEventListener("click", onOk);
                cancelBtn.addEventListener("click", onCancel);
                input.addEventListener("keydown", onKey);
                modal.addEventListener("click", onBackdrop);
                document.addEventListener("keydown", onEsc);

                modal.hidden = false;
                // Defer focus until the dialog is visible so the
                // cursor lands in the input and the soft keyboard (on
                // touch devices) is ready.
                setTimeout(() => { input.focus(); input.select(); }, 0);
            });
        }

        /**
         * Run a mutating fetch that carries the X-Vault-Password header
         * and re-prompts the user with a warning if the server rejects
         * the password (HTTP 403).
         *
         * Why we re-prompt here instead of letting the browser handle it:
         * the vault's authentication uses a CUSTOM header
         * (``X-Vault-Password``), not HTTP Basic / Digest. If the server
         * answered 401 with a ``WWW-Authenticate`` challenge, browsers
         * would show their native username+password dialog (the
         * "site is not private" / login popup the user objected to).
         * The backend deliberately returns 403 with no
         * ``WWW-Authenticate`` header; this helper is what catches that
         * 403, shows a "Wrong vault password" warning INSIDE our own
         * prompt (which only ever asks for the vault password, never a
         * username), and keeps re-prompting until the user enters the
         * correct password OR cancels the prompt (there is no attempt
         * cap).
         *
         * Returns the parsed JSON body on success.
         * Returns ``null`` if the user cancelled the prompt.
         * Throws on any non-403 server error so the caller can show it.
         */
        async function sendVaultWrite({
            url, body, method, passwordReason,
            wrongReason = "Wrong vault password. Please try again.",
            onWrong,                                        // optional: called after every 403 so the caller can flash an error while the next prompt is up
            onCancel,                                       // optional: called once when the user cancels the prompt, so the caller can wipe the red wrong-password text
        }) {
            for (let attempt = 1; ; attempt++) {
                const password = await promptVaultPassword(
                    attempt === 1
                        ? passwordReason
                        // Prepend the warning text so the user sees
                        // "Wrong vault password" above the original
                        // action-specific reason on retry attempts.
                        : (wrongReason + "\n\n" + passwordReason)
                );
                if (!password) {
                    // User cancelled. Give the caller a chance to
                    // wipe any red "Wrong vault password" text it
                    // flashed via ``onWrong`` so the page doesn't
                    // stay on the error state after a cancel.
                    if (typeof onCancel === "function") {
                        try { onCancel(); } catch (_) { /* ignore */ }
                    }
                    return null;        // user cancelled
                }

                const res = await fetch(url, {
                    method,
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "X-Vault-Password": password,
                    },
                    body: body !== undefined && body !== null
                        ? JSON.stringify(body)
                        : undefined,
                });

                if (res.ok) {
                    return res.json();
                }

                // 403 = bad password. Any other status is a real
                // error: surface it and stop retrying (we don't want
                // to spam the user with prompts for, say, a 500
                // Internal Error).
                if (res.status !== 403) {
                    const txt = await res.text();
                    throw new Error("HTTP " + res.status + ": " + txt);
                }
                // Tell the caller to flash an error in its UI *before*
                // the next prompt appears, so the user has feedback
                // that the previous attempt failed. No upper bound on
                // wrong-password attempts; the loop only exits via
                // ``return null`` (user cancelled) or
                // ``return res.json()`` (success).
                if (typeof onWrong === "function") {
                    try { onWrong(wrongReason); } catch (_) { /* ignore */ }
                }
            }
        }

        /** Group key for a snippet. The API preserves the user's casing
         *  on `tool`, so we keep it as-is here too — that way the
         *  sidebar and the group header show the exact name the user
         *  registered (e.g. "Docker", not "docker"). The unique-Tool
         *  table already separates rows by exact name, so casing is
         *  what users see in the sidebar. */
        function toolKey(snippet) {
            return (snippet.tool || "").trim() || "text";
        }

        function plural(n) { return n === 1 ? "Item" : "Items"; }

        /** Reflect the current checkedIds set on the Delete button. */
        function updateDeleteButton() {
            const n = checkedIds.size;
            els.deleteBtn.textContent = "Delete " + n + " " + plural(n);
            els.deleteBtn.disabled = (n === 0);
        }

        // --------------------------------------------------------------
        // Rendering
        // --------------------------------------------------------------

        function renderTable(snippets) {
            els.tableWrap.innerHTML = "";

            if (!snippets.length) {
                const p = document.createElement("p");
                p.className = "empty-state";
                p.textContent = "No snippets yet. Create one to get started.";
                els.tableWrap.appendChild(p);
                return;
            }

            // Group snippets by tool.
            const groups = new Map();
            for (const s of snippets) {
                const tool = toolKey(s);
                if (!groups.has(tool)) groups.set(tool, []);
                groups.get(tool).push(s);
            }

            // Sort group names alphabetically for deterministic order.
            const sortedTools = Array.from(groups.keys()).sort();

            const table = document.createElement("table");

            // The thead just contains the single "Select" column header.
            // Group headers (full-width group rows) sit inside the tbody.
            const thead = document.createElement("thead");
            const headRow = document.createElement("tr");
            const headTh = document.createElement("th");
            headTh.textContent = "Select";
            headTh.setAttribute("aria-label", "Select column");
            headRow.appendChild(headTh);
            thead.appendChild(headRow);
            table.appendChild(thead);

            const tbody = document.createElement("tbody");

            for (const tool of sortedTools) {
                const items = groups.get(tool);

                // --- GROUP HEADER ROW (spans all 3 columns) ---
                const groupRow = document.createElement("tr");
                groupRow.className = "group-header";
                const groupCell = document.createElement("td");
                groupCell.colSpan = 3;
                groupCell.textContent = tool;
                groupRow.appendChild(groupCell);
                tbody.appendChild(groupRow);

                // --- DATA ROWS (one per snippet under this tool) ---
                for (const s of items) {
                    const row = document.createElement("tr");
                    row.className = "data-row";
                    row.dataset.id = String(s.id);

                    // Column 1: checkbox.
                    const tdCheck = document.createElement("td");
                    tdCheck.className = "col-check";
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.dataset.id = String(s.id);
                    cb.checked = checkedIds.has(s.id);
                    cb.setAttribute("aria-label", "Select snippet " + s.id);
                    cb.addEventListener("change", () => onRowToggled(s.id, cb.checked));
                    tdCheck.appendChild(cb);
                    row.appendChild(tdCheck);

                    // Column 2: title.
                    const tdTitle = document.createElement("td");
                    tdTitle.className = "col-title";
                    tdTitle.textContent = s.title || "(untitled)";
                    row.appendChild(tdTitle);

                    // Column 3: edit link.
                    const tdEdit = document.createElement("td");
                    tdEdit.className = "col-edit";
                    const a = document.createElement("a");
                    a.className = "edit-link";
                    a.href = "/edit/" + s.id + "/";
                    a.textContent = "Edit";
                    tdEdit.appendChild(a);
                    row.appendChild(tdEdit);

                    tbody.appendChild(row);
                }
            }

            table.appendChild(tbody);
            els.tableWrap.appendChild(table);
        }

        // --------------------------------------------------------------
        // Event handlers
        // --------------------------------------------------------------

        function onRowToggled(id, checked) {
            if (checked) checkedIds.add(id);
            else checkedIds.delete(id);
            updateDeleteButton();
        }

        async function onDeleteClicked() {
            const ids = Array.from(checkedIds);
            if (ids.length === 0) return;

            // ``sendVaultWrite`` owns the password prompt and the
            // 403-retry-with-warning loop, so this handler only worries
            // about the UI side: disable the button, restore on error.
            els.deleteBtn.disabled = true;
            const originalText = els.deleteBtn.textContent;
            els.deleteBtn.textContent = "Deleting...";

            try {
                const body = await sendVaultWrite({
                    url: API_BATCH,
                    method: "POST",
                    body: { ids: ids },
                    passwordReason:
                        "Enter the vault password to delete "
                        + ids.length + " snippet(s):",
                    // The vault password modal already displays the
                    // "Wrong vault password" warning inside itself
                    // on every retry, so the page-level status line
                    // is intentionally left untouched for password
                    // failures — only success / failure of the final
                    // request is reported there (by the caller below).
                });
                if (!body) {
                    // User cancelled the password prompt. Re-render
                    // the button label from the current selection
                    // (e.g. "Delete 3 Items") and re-enable it. We
                    // deliberately do NOT clear the checkboxes — the
                    // user only cancelled the delete, not the
                    // selection itself, so the same selection can be
                    // retried with a different password.
                    updateDeleteButton();
                    return;
                }
                setStatus("Deleted " + (body.deleted || 0) + " snippet(s).", "ok");
                // Clear selection and re-render. The setStatus() call
                // above started the 5-second auto-dismiss timer; we
                // rely on the loadAndRender() guard below (see comment
                // in loadAndRender's catch) to NOT overwrite this
                // fresh success banner with a persistent "Error" if
                // the post-delete re-fetch happens to fail.
                checkedIds = new Set();
                await loadAndRender();
            } catch (err) {
                setStatus("Delete failed: " + err.message, "err");
                els.deleteBtn.disabled = false;
                els.deleteBtn.textContent = originalText;
            }
        }

        // --------------------------------------------------------------
        // Data loading
        // --------------------------------------------------------------

        async function loadAndRender() {
            try {
                const res = await fetch(API_LIST, {
                    headers: { "Accept": "application/json" },
                });
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                lastSnippets = data;
                renderTable(data);
                updateDeleteButton();
            } catch (err) {
                els.tableWrap.innerHTML = "";
                const p = document.createElement("p");
                p.className = "error";
                p.textContent = "Failed to load snippets: " + err.message;
                els.tableWrap.appendChild(p);
                // Only surface the load failure to the status line if
                // there's no fresh success message currently displayed.
                // Otherwise the post-action "Deleted N snippet(s)."
                // banner (which is on a 5-second auto-dismiss) would be
                // instantly replaced by an "Error" message that never
                // clears — making it look like the success message is
                // stuck. We suppress the overwrite here and rely on
                // the inline error in the table area for visibility.
                if (!lastStatusMsg || lastStatusMsg === "" || lastStatusMsg === "Error") {
                    setStatus("Error", "err");
                }
            }
            // Tool/Stack sidebar is driven by the Tool registry, NOT
            // by the snippets table — that way a brand-new entry the
            // user added via the sidebar appears immediately even when
            // no snippet has been created against it yet, and a deleted
            // entry vanishes from the sidebar the instant it's removed.
            // Falls back to snippet-derived names only if the registry
            // endpoint is unreachable (e.g. backend down).
            await refreshToolRegistry();
        }

        // Fetch the Tool/Stack registry and re-render the sidebar.
        // On failure we fall back to the names actually present in the
        // currently-loaded snippets so the UI still has *something*
        // to show instead of going blank.
        async function refreshToolRegistry() {
            try {
                const res = await fetch(API_TOOLS_LIST, {
                    headers: { "Accept": "application/json" },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data.tools)) {
                        lastTools = data.tools.slice();
                        renderSidebar(lastTools);
                        return;
                    }
                }
            } catch (err) {
                // fall through to fallback
            }
            const derived = Array.from(
                new Set((lastSnippets || []).map(toolKey))
            );
            lastTools = derived;
            renderSidebar(lastTools);
        }

        // --------------------------------------------------------------
        // Sidebar: Manage Tools/Stacks
        // --------------------------------------------------------------

        /**
         * Build the unique-tools list (with per-tool snippet counts) from
         * the already-loaded registry + snippet array, and render one
         * <li> per tool. The "Add Stack" row lives in markup at the top
         * of the list and is reattached at the bottom of this function
         * so it always stays above any data rows.
         */
        function renderSidebar(toolNames) {
            // Capture and remove the static "Add Stack" row so we can
            // rebuild the list contents without losing it.
            const addRow = els.toolsList.querySelector("#add-tool-row");
            // Defensive scrub: if the row is currently in edit mode
            // (input + Tick/Cross inserted by enterAddMode) those
            // children survive the innerHTML reset below via
            // appendChild(addRow) and the next render starts with
            // stray buttons leaking into the Add Stack row. Drop them
            // FIRST so the row returns to its pristine static state
            // before we re-attach it.
            if (addRow && addRow.classList.contains("editing")) {
                addRow.classList.remove("editing");
                const label = addRow.querySelector(".add-label");
                const addBtn = addRow.querySelector(".add-btn");
                if (label) label.style.display = "";
                if (addBtn) addBtn.style.display = "";
                while (addRow.firstChild) addRow.removeChild(addRow.firstChild);
                // Re-create the static children we just deleted so
                // the row keeps its original markup.
                const newLabel = document.createElement("span");
                newLabel.className = "tool-name add-label";
                newLabel.textContent = "+ Add Tool";
                const newActions = document.createElement("span");
                newActions.className = "tool-actions";
                const newBtn = document.createElement("button");
                newBtn.type = "button";
                newBtn.className = "icon-btn add-btn";
                newBtn.title = "Add a new tool";
                newBtn.setAttribute(
                    "aria-label", "Add a new tool"
                );
                newBtn.textContent = "+";
                newActions.appendChild(newBtn);
                addRow.appendChild(newLabel);
                addRow.appendChild(newActions);
            }
            els.toolsList.innerHTML = "";
            if (addRow) els.toolsList.appendChild(addRow);
            // Re-bind the freshly-created "+ Add Stack" button so
            // clicking it opens the inline-edit form again. Without
            // this the recreated button (from the defensive scrub
            // above) is dead because the click listener was attached
            // to the OLD button that we just deleted.
            if (typeof bindAddRow === "function") {
                bindAddRow();
            }

            if (!toolNames || toolNames.length === 0) {
                // No registered tools at all — leave the Add row alone
                // and show the empty hint below it.
                const li = document.createElement("li");
                li.className = "sidebar-empty";
                li.textContent = "No tools yet. Click + Add Tool above to create one.";
                els.toolsList.appendChild(li);
                return;
            }

            // Aggregate counts per tool key from the cached snippets,
            // so a tool with zero snippets still shows with count = 0.
            const counts = new Map();
            for (const s of lastSnippets) {
                const k = toolKey(s);
                counts.set(k, (counts.get(k) || 0) + 1);
            }

            const sortedTools = Array.from(new Set(toolNames)).sort();
            for (const tool of sortedTools) {
                els.toolsList.appendChild(
                    buildToolRow(tool, counts.get(tool) || 0)
                );
            }
        }

        /** One sidebar row: name + count + Edit + Delete icon buttons. */
        function buildToolRow(toolName, count) {
            const li = document.createElement("li");
            li.className = "tool-row";
            li.dataset.tool = toolName;

            // Tool name span.
            const nameSpan = document.createElement("span");
            nameSpan.className = "tool-name";
            nameSpan.textContent = toolName;
            li.appendChild(nameSpan);

            // Count badge.
            const countSpan = document.createElement("span");
            countSpan.className = "tool-count";
            countSpan.textContent = String(count);
            li.appendChild(countSpan);

            // Edit icon (pencil).
            const editBtn = document.createElement("button");
            editBtn.type = "button";
            editBtn.className = "icon-btn";
            editBtn.title = "Rename tool";
            editBtn.setAttribute("aria-label", "Rename tool " + toolName);
            editBtn.textContent = "\u270E"; // ✎
            editBtn.addEventListener("click", () => enterEditMode(li, toolName));
            li.appendChild(editBtn);

            // Delete icon (trash).
            const delBtn = document.createElement("button");
            delBtn.type = "button";
            delBtn.className = "icon-btn danger";
            delBtn.title = "Delete all snippets with this tool";
            delBtn.setAttribute("aria-label", "Delete tool " + toolName);
            delBtn.textContent = "\u2716"; // ✖
            delBtn.addEventListener("click", () => onDeleteToolClicked(toolName));
            li.appendChild(delBtn);

            return li;
        }

        /**
         * Wire the "Add Stack" row at the top of the sidebar. Clicking
         * the + button transforms the row into an inline input + Tick /
         * Cross, mirroring the per-tool rename flow. Tick POSTs to the
         * ``/api/snippets/tools/`` endpoint (gated by the vault
         * password), then rebuilds the sidebar to include the new tool
         * row on success.
         */
        function bindAddRow() {
            const addRow = document.getElementById("add-tool-row");
            if (!addRow) return;
            const addBtn = addRow.querySelector(".add-btn");
            const label = addRow.querySelector(".add-label");
            if (!addBtn || !label) return;

            // Idempotent: re-binding on every render would otherwise
            // stack duplicate click handlers.
            addBtn.onclick = null;
            addBtn.addEventListener("click", () => enterAddMode(addRow));
        }

        function enterAddMode(addRow) {
            // Reentrancy guard: if the row is already in edit mode,
            // ignore the click. Without this a stray second click on
            // "+" (or any path that re-invokes enterAddMode while
            // edit mode is still active) stacks a second input + Tick/
            // Cross on top of the first set, producing a row with two
            // inputs and four icon buttons instead of one of each.
            if (addRow.classList.contains("editing")) return;
            const label = addRow.querySelector(".add-label");
            const addBtn = addRow.querySelector(".add-btn");
            if (!label || !addBtn) return;

            // Hide the static "+" + label while editing so the row
            // shows only the input + Tick/Cross — same visual contract
            // as enterEditMode.
            label.style.display = "none";
            addBtn.style.display = "none";
            // Drop the dashed "Add Stack" chrome during edit so the row
            // doesn't read as a stack of four bordered boxes.
            addRow.classList.add("editing");

            const input = document.createElement("input");
            input.type = "text";
            input.className = "tool-add-input";
            input.placeholder = "new-tool";
            input.setAttribute("aria-label", "New tool name");

            const tickBtn = document.createElement("button");
            tickBtn.type = "button";
            tickBtn.className = "icon-btn save";
            tickBtn.title = "Save";
            tickBtn.setAttribute("aria-label", "Save new tool");
            tickBtn.textContent = "\u2713"; // ✓

            const crossBtn = document.createElement("button");
            crossBtn.type = "button";
            crossBtn.className = "icon-btn danger";
            crossBtn.title = "Cancel";
            crossBtn.setAttribute("aria-label", "Cancel add tool");
            crossBtn.textContent = "\u2715"; // ✕

            // Insert input where the label was, then Tick + Cross on
            // the right of the row.
            addRow.insertBefore(input, label);
            addRow.appendChild(crossBtn);
            addRow.appendChild(tickBtn);

            input.focus();

            function exit(revert) {
                // Always drop the input + Tick/Cross.
                if (input.parentNode === addRow) addRow.removeChild(input);
                if (tickBtn.parentNode === addRow) addRow.removeChild(tickBtn);
                if (crossBtn.parentNode === addRow) addRow.removeChild(crossBtn);
                if (revert) {
                    // No half-state to roll back: just restore the
                    // static label + button visibility.
                    label.style.display = "";
                }
                addBtn.style.display = "";
                // Restore the dashed chrome so the row advertises
                // "+ Add Stack" again.
                addRow.classList.remove("editing");
            }

            crossBtn.addEventListener("click", () => exit(true));

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    tickBtn.click();
                } else if (e.key === "Escape") {
                    e.preventDefault();
                    crossBtn.click();
                }
            });

            tickBtn.addEventListener("click", async () => {
                const newName = input.value.trim();
                if (!newName) {
                    setStatus("New tool name cannot be empty.", "err");
                    input.focus();
                    return;
                }
                // Tool/Stack uniqueness is case-insensitive: "Jenkins",
                // "jenkins", and "jenKINs" all refer to the same registry
                // row. Block the duplicate here, BEFORE prompting the
                // vault password, so the user gets instant feedback and
                // never has to type the password just to learn the
                // name is taken.
                const newKey = newName.toLowerCase();
                const clash = lastTools.find(
                    (t) => (t || "").toLowerCase() === newKey
                );
                if (clash) {
                    setStatus(
                        "A tool named \"" + clash
                            + "\" already exists. "
                            + "\"" + newName + "\" is the same name.",
                        "err"
                    );
                    input.focus();
                    input.select();
                    return;
                }
                tickBtn.disabled = true;
                crossBtn.disabled = true;
                input.disabled = true;
                try {
                    const body = await sendVaultWrite({
                        url: API_TOOLS_CREATE,
                        method: "POST",
                        body: { name: newName },
                        passwordReason:
                        "Enter the vault password to create new tool \""
                        + newName + "\":",
                    // The vault password modal already displays the
                    // "Wrong vault password" warning inside itself
                    // on every retry, so the page-level status line
                    // is intentionally left untouched for password
                    // failures — only success / failure of the final
                    // request is reported there (by the caller below).
                    });
                    if (!body) {
                        // User cancelled the prompt. Re-enable the
                        // input so the row is not stuck in a half-
                        // edited limbo where only the input is
                        // interactable.
                        exit(true);
                        return;
                    }
                    // Optimistically add to local list so the new
                    // row appears immediately, then re-fetch the
                    // canonical registry list to keep the order
                    // consistent with the server (alphabetical).
                    if (!lastTools.includes(body.name)) {
                        lastTools.push(body.name);
                    }
                    setStatus(
                        "Created new tool \"" + body.name + "\".", "ok"
                    );
                    // Restore the static "+ Add Stack" row (drop the
                    // input + Tick/Cross controls, unhide the label
                    // and "+" button). Without this the row stays in
                    // edit mode forever and the Add button never
                    // comes back.
                    exit(true);
                    // Pull the canonical registry list back so the
                    // sidebar matches the server's ordering and the
                    // new entry is in its proper alphabetical slot.
                    await refreshToolRegistry();
                    bindAddRow();
                } catch (err) {
                    setStatus(
                        "Create tool failed: " + err.message, "err"
                    );
                    // Fully roll the row back to its static
                    // "+ Add Stack" state (drop the input + Tick/
                    // Cross children, remove the .editing class,
                    // unhide the label and "+" button). Re-enabling
                    // the controls in place would otherwise leave
                    // the inline-edit children attached and the
                    // .editing class stuck on, which leaks across
                    // the next ``renderSidebar`` call.
                    exit(true);
                }
            });
        }

/**
         * Replace the static name span with an <input> + Tick/Cross icons.
         * Cross reverts; Tick fires the bulk-rename endpoint, then rebuilds
         * the table (and the sidebar) on success.
         */
        function enterEditMode(li, oldName) {
            // Reentrancy guard: ignore a second pencil click while the
            // row is already in edit mode. Without this a double-click
            // would stack a second input + Tick/Cross on top of the
            // first set, leaking duplicate controls into the row.
            if (li.querySelector(".tool-edit-input")) return;
            const nameSpan = li.querySelector(".tool-name");
            const countSpan = li.querySelector(".tool-count");
            const actions = li.querySelectorAll(".icon-btn");
            if (!nameSpan) return;

            // Hide the static action buttons while editing so the row
            // shows only the input + Tick/Cross.
            actions.forEach((b) => { b.style.display = "none"; });

            const input = document.createElement("input");
            input.type = "text";
            input.className = "tool-edit-input";
            input.value = oldName;
            input.setAttribute("aria-label", "New name for " + oldName);

            // Tick (save).
            const tickBtn = document.createElement("button");
            tickBtn.type = "button";
            tickBtn.className = "icon-btn save";
            tickBtn.title = "Save";
            tickBtn.setAttribute("aria-label", "Save rename");
            tickBtn.textContent = "\u2713"; // ✓

            // Cross (cancel).
            const crossBtn = document.createElement("button");
            crossBtn.type = "button";
            crossBtn.className = "icon-btn danger";
            crossBtn.title = "Cancel";
            crossBtn.setAttribute("aria-label", "Cancel rename");
            crossBtn.textContent = "\u2715"; // ✕

            // Replace name span with input; keep count; add tick + cross.
            li.replaceChild(input, nameSpan);
            li.insertBefore(tickBtn, countSpan.nextSibling);
            li.insertBefore(crossBtn, tickBtn);
            input.focus();
            input.select();

            function exit(revert) {
                // Remove input + tick + cross.
                if (input.parentNode === li) li.removeChild(input);
                if (tickBtn.parentNode === li) li.removeChild(tickBtn);
                if (crossBtn.parentNode === li) li.removeChild(crossBtn);
                if (revert) {
                    // Restore original name span.
                    const restored = document.createElement("span");
                    restored.className = "tool-name";
                    restored.textContent = oldName;
                    li.insertBefore(restored, countSpan);
                }
                // Re-show the static action buttons.
                actions.forEach((b) => { b.style.display = ""; });
            }

            crossBtn.addEventListener("click", () => exit(true));

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    tickBtn.click();
                } else if (e.key === "Escape") {
                    e.preventDefault();
                    crossBtn.click();
                }
            });

            tickBtn.addEventListener("click", async () => {
                const newName = input.value.trim();
                if (!newName) {
                    setStatus("New name cannot be empty.", "err");
                    input.focus();
                    return;
                }
                if (newName.toLowerCase() === oldName.toLowerCase()) {
                    // No-op: just exit edit mode without hitting the
                    // API. Compare case-insensitively because "Jenkins"
                    // -> "jenkins" is not a rename under the
                    // case-insensitive uniqueness contract.
                    exit(true);
                    return;
                }
                // Per the spec, every save is gated (no session
                // unlock), so we prompt each time. ``sendVaultWrite``
                // re-prompts automatically with a "Wrong password"
                // warning if the server rejects the password.
                tickBtn.disabled = true;
                crossBtn.disabled = true;
                input.disabled = true;
                try {
                    const body = await sendVaultWrite({
                        url: API_BULK_RENAME,
                        method: "POST",
                        body: { old: oldName, new: newName },
                        passwordReason:
                        "Enter the vault password to rename \"" + oldName
                        + "\" -> \"" + newName + "\":",
                    // The vault password modal already displays the
                    // "Wrong vault password" warning inside itself
                    // on every retry, so the page-level status line
                    // is intentionally left untouched for password
                    // failures — only success / failure of the final
                    // request is reported there (by the caller below).
                    });
                    if (!body) {
                        // User cancelled the password prompt. Roll
                        // the row fully back to its original state
                        // (restore the static name span, drop the
                        // tick/cross inputs, and RE-SHOW the original
                        // Edit/Delete icon buttons) so the sidebar
                        // is not left in a half-edited limbo where
                        // only the inline input is interactable.
                        exit(true);
                        return;
                    }
                    setStatus(
                        "Renamed \"" + oldName + "\" -> \"" + newName + "\" ("
                            + (body.updated || 0) + " snippet(s)).",
                        "ok"
                    );
                    // Refresh from the server so both sidebar and
                    // table reflect the new tool name. loadAndRender()
                    // is now aware of the fresh success banner above
                    // and will NOT clobber it with "Error" if its
                    // own re-fetch fails.
                    await loadAndRender();
                } catch (err) {
                    setStatus("Rename failed: " + err.message, "err");
                    // Fully roll the row back to its static
                    // read-only state on error so the user can
                    // retry cleanly. The next ``renderSidebar``
                    // rebuilds data rows from scratch so this is
                    // cosmetic for the sidebar but keeps parity
                    // with the user-cancel path.
                    exit(true);
                }
            });
        }

        /**
         * Delete the tool AND every snippet under it in a single
         * server-side transaction (see DELETE /api/snippets/tools/<n>/).
         * Refreshes both the sidebar (registry list) and the table.
         */
        async function onDeleteToolClicked(toolName) {
            // ``sendVaultWrite`` re-prompts with a "Wrong password"
            // warning when the server returns 403, so the user does
            // not have to click the trash icon a second time to retry.
            try {
                const body = await sendVaultWrite({
                    url: API_TOOLS_DELETE(toolName),
                    method: "DELETE",
                    body: {},
                    passwordReason:
                        "Enter the vault password to delete tool \""
                        + toolName + "\" and all its snippets:",
                    // The vault password modal already displays the
                    // "Wrong vault password" warning inside itself
                    // on every retry, so the page-level status line
                    // is intentionally left untouched for password
                    // failures — only success / failure of the final
                    // request is reported there (by the caller below).
                });
                if (!body) return;                  // user cancelled
                setStatus(
                    "Deleted tool \"" + toolName + "\" and "
                        + (body.deleted_snippets || 0) + " snippet(s).",
                    "ok"
                );
                // Clear any selections that just got nuked. The
                // loadAndRender() catch block has a guard that
                // won't clobber this fresh success banner with
                // "Error" if the follow-up re-fetch fails.
                checkedIds = new Set();
                await loadAndRender();
            } catch (err) {
                setStatus("Tool delete failed: " + err.message, "err");
            }
        }

        // Persistent listener on the Delete button.
        els.deleteBtn.addEventListener("click", onDeleteClicked);

        // Bind the "+ Add Stack" row's click handler. ``bindAddRow``
        // is also called after every ``renderSidebar`` so the handler
        // survives re-renders of the data rows below it.
        bindAddRow();

        // Initial load.
        loadAndRender();
    })();
    </script>
</body>
</html>
