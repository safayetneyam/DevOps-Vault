<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Snippet - DevOps Vault</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-muted: #475569;
            --text-soft: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
            --success: #15803d;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            /* Global horizontal breathing room so content never hugs
               the viewport edges. */
            padding: 0 5%;
        }

        header {
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            font-weight: 700;
        }

        header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        h2 {
            margin: 0 0 1rem;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="text"]:focus,
        select,
        textarea {
            width: 100%;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            padding: 0.65rem 0.8rem;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-color: transparent;
        }

        select {
            /* Match height of text inputs visually. */
            appearance: none;
            -webkit-appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
            background-position:
                calc(100% - 18px) calc(50% - 2px),
                calc(100% - 13px) calc(50% - 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            padding-right: 2rem;
        }

        textarea {
            font-family: var(--mono);
            min-height: 220px;
            resize: vertical;
            white-space: pre;
            line-height: 1.45;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .field-row { grid-template-columns: 1fr; }

            /* Stack header into two centered rows.
               Row 1: "DevOps Vault" title.
               Row 2: ghost buttons (Back to Vault, Admin).
               Tablet/desktop keep the original side-by-side layout. */
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
                padding: 0.85rem 1rem;
            }

            header h1 {
                text-align: center;
                font-size: 1.25rem;
            }

            .header-actions {
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.6rem;
            }
        }

        .actions {
            margin-top: 1.25rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            justify-content: flex-end;
        }

        /* Single source of truth for the form-button SHAPE. Both the
           primary submit ("Create Snippet") and the Cancel anchor share
           these EXACT shape rules so they are pixel-identical except
           for color. Scoped to actual interactive form-button elements:
             - every real <button> (incl. type="submit")
             - anchors explicitly marked with .btn or .danger
           so the header logo / ghost links are NOT turned into buttons. */
        button,
        a.btn,
        a.danger {
            border: 0;
            border-radius: 6px;
            padding: 0.6rem 1.1rem;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.4;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        /* Primary (accent) variant — used by "Create Snippet". */
        button.btn-primary,
        a.btn-primary,
        button[type="submit"] {
            background: var(--accent);
            color: #fff;
        }
        button.btn-primary:hover,
        button.btn-primary:focus,
        a.btn-primary:hover,
        a.btn-primary:focus,
        button[type="submit"]:hover,
        button[type="submit"]:focus {
            background: var(--accent-hover);
        }

        /* Header link-buttons (Home, + New Snippet, Admin, etc.) get
           the same accent-bordered ghost style across every page. */
        a.ghost,
        button.ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 0.45rem 0.85rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }

        a.ghost:hover,
        button.ghost:hover { background: var(--accent); color: #fff; }

        /* Red solid-button style. Shares the EXACT same shape rules
           as the primary button so Cancel + Create Snippet match
           pixel-for-pixel except for color. */
        a.danger,
        button.danger {
            background: var(--danger);
            color: #fff;
        }

        a.danger:hover,
        a.danger:focus,
        button.danger:hover,
        button.danger:focus { background: #b91c1c; color: #fff; }

        button:disabled { opacity: 0.6; cursor: progress; }

        #status {
            font-size: 0.9rem;
            color: var(--text-soft);
            margin-right: auto;
        }

        #status.ok { color: var(--success); }
        #status.err { color: var(--danger); }
    </style>
</head>
<body>
    <header>
        <h1>
            <a href="/" style="color: inherit; text-decoration: none;">
                DevOps <span>Vault</span>
            </a>
        </h1>
        <div class="header-actions">
            <a href="/" class="ghost" role="button">&larr; Back to Vault</a>
            <a href="/temp-admin/" class="ghost" role="button">Admin</a>
        </div>
    </header>

    <main>
        <section class="card">
            <h2>New Snippet</h2>
            <form id="create-form" autocomplete="off" novalidate>
                <div class="field">
                    <label for="f-title">Title</label>
                    <input type="text" id="f-title" name="title" required maxlength="255" placeholder="Force Delete K8s Namespace">
                </div>
                <div class="field">
                    <label for="f-code">Code Body</label>
                    <!-- <textarea>, not <input>: required to capture
                         multiline content and preserve whitespace. -->
                    <textarea id="f-code" name="code_body" required spellcheck="false"
                              placeholder="kubectl delete ns foo --force --grace-period=0"></textarea>
                </div>
                <div class="field-row">
                    <div class="field">
                    <label for="f-tool">Tool</label>
                    <!-- <select> populated at load time from the Tool
                         registry (GET /api/snippets/tools/). If the
                         admin has added or deleted Tools since this
                         page was cached, those changes flow through
                         to the dropdown automatically. Falls back
                         to a built-in list if the API is empty or
                         unreachable so the form is never blank. -->
                    <select id="f-tool" name="tool" required>
                        <option value="" disabled>Select a tool&hellip;</option>
                    </select>
                </div>
                    <div class="field">
                        <label for="f-tags">Tags (comma-separated)</label>
                        <!-- <input list="tag-suggestions"> + <datalist>
                             below: free-text input with auto-suggest from
                             existing tags in the vault. -->
                        <input type="text" id="f-tags" name="tags"
                               list="tag-suggestions"
                               placeholder="k8s, cleanup"
                               autocomplete="off">
                        <datalist id="tag-suggestions"></datalist>
                    </div>
                </div>
                <div class="actions">
                    <span id="status" aria-live="polite"></span>
                    <a href="/" class="danger">Cancel</a>
                    <button type="submit" id="create-btn">Create Snippet</button>
                </div>
            </form>
        </section>
    </main>

    <script>
    (function () {
        "use strict";

        const API = "/api/snippets/";
        const API_TOOLS = "/api/snippets/tools/";
        const status = document.getElementById("status");
        const form = document.getElementById("create-form");
        const btn = document.getElementById("create-btn");
        const tagInput = document.getElementById("f-tags");
        const tagSuggestions = document.getElementById("tag-suggestions");
        const toolSelect = document.getElementById("f-tool");

        // Shown inside the tool/stack <select> when the registry is
        // empty (no stacks have been added by the admin yet) so the
        // user understands why the dropdown is not populated.
        const EMPTY_REGISTRY_MESSAGE =
            "No Tool Exists to Choose";

        function setStatus(msg, kind) {
            status.textContent = msg || "";
            status.className = kind || "";
        }

        /**
         * Ask the user for the shared vault password. Returns the
         * trimmed password on success, or ``null`` if the user
         * cancelled or left the field blank. Per the spec, every save
         * re-prompts (no session unlock).
         */
        function promptVaultPassword(reason) {
            const pw = window.prompt(
                (reason || "Enter the vault password:") + "\n\n"
                    + "Leave blank and press OK to cancel."
            );
            if (pw === null) return null;
            const trimmed = pw.trim();
            return trimmed || null;
        }

        /**
         * Run a mutating fetch that carries the X-Vault-Password header
         * and re-prompts the user with a warning if the server rejects
         * the password (HTTP 403).
         *
         * The vault uses a custom header — it is NOT HTTP Basic auth —
         * so we deliberately reject with 403 and no
         * ``WWW-Authenticate`` header. Without that header the browser
         * does NOT pop its native username/password dialog. This helper
         * catches the 403, re-prompts with a "Wrong vault password"
         * warning (still a single-password prompt, no username field),
         * and keeps re-prompting until the user enters the correct
         * password OR cancels the prompt (there is no attempt cap).
         *
         * Returns the parsed JSON body on success, ``null`` if the user
         * cancelled the prompt, or throws on any non-403 server error.
         */
        async function sendVaultWrite({
            url, body, method, passwordReason,
            wrongReason = "Wrong vault password. Please try again.",
            onWrong,                                        // optional: called after every 403 so the caller can flash an error while the next prompt is up
            onCancel,                                       // optional: called once when the user cancels the prompt, so the caller can wipe the red wrong-password text
        }) {
            for (let attempt = 1; ; attempt++) {
                const password = promptVaultPassword(
                    attempt === 1
                        ? passwordReason
                        : (wrongReason + "\n\n" + passwordReason)
                );
                if (!password) {
                    // User cancelled. Give the caller a chance to
                    // wipe any red "Wrong vault password" text it
                    // flashed via ``onWrong`` so the page doesn't
                    // stay on the error state after a cancel.
                    if (typeof onCancel === "function") {
                        try { onCancel(); } catch (_) { /* ignore */ }
                    }
                    return null;
                }

                const res = await fetch(url, {
                    method,
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "X-Vault-Password": password,
                    },
                    body: body !== undefined && body !== null
                        ? JSON.stringify(body)
                        : undefined,
                });

                if (res.ok) {
                    return res.json();
                }
                if (res.status !== 403) {
                    const txt = await res.text();
                    throw new Error("HTTP " + res.status + ": " + txt);
                }
                // 403 = bad password. Let the caller flash an error
                // in its UI *before* the next prompt appears so the
                // user has feedback that the previous attempt failed.
                if (typeof onWrong === "function") {
                    try { onWrong(wrongReason); } catch (_) { /* ignore */ }
                }
                // No upper bound on attempts; the loop only exits via
                // ``return null`` (user cancelled) or
                // ``return res.json()`` (success).
            }
        }

        // Defense-in-depth: even though the model.save() normalizes,
        // we lowercase tags here too so any UI flow stays consistent
        // and the wire payload is canonical.
        function normalizeTags(raw) {
            return raw
                .split(/[,\s]+/)
                .map((t) => t.trim().toLowerCase())
                .filter(Boolean)
                // dedupe, preserve order
                .filter((t, i, arr) => arr.indexOf(t) === i)
                .join(", ");
        }

        /**
         * Fetch all existing snippets once and extract a deduplicated,
         * sorted list of unique tags for the <datalist>. We call the
         * list endpoint (no search filter) so we see everything.
         *
         * Failures are silent: an empty <datalist> just disables
         * auto-suggest without breaking the form.
         */
        async function loadTagSuggestions() {
            try {
                const res = await fetch(API, {
                    headers: { "Accept": "application/json" },
                });
                if (!res.ok) return;
                const snippets = await res.json();
                const seen = new Set();
                for (const s of snippets) {
                    if (!s.tags) continue;
                    s.tags
                        .split(",")
                        .map((t) => t.trim().toLowerCase())
                        .filter(Boolean)
                        .forEach((t) => seen.add(t));
                }
                const sorted = Array.from(seen).sort();
                // datalist children must be <option value="...">.
                tagSuggestions.innerHTML = sorted
                    .map((t) => {
                        const opt = document.createElement("option");
                        opt.value = t;
                        return opt.outerHTML;
                    })
                    .join("");
            } catch (_) {
                /* ignore - suggestions are best-effort */
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById("f-title").value.trim(),
                code_body: document.getElementById("f-code").value,
                tool: document.getElementById("f-tool").value.trim(),
                tags: normalizeTags(tagInput.value),
            };
            if (!payload.title || !payload.code_body) {
                setStatus("Title and Code Body are required.", "err");
                return;
            }
            if (!payload.tool) {
                setStatus("Please choose a tool value.", "err");
                return;
            }

            // Vault write-protection: ``sendVaultWrite`` handles the
            // password prompt AND the 403-retry-with-warning loop, so
            // the only thing this handler controls is the form's
            // button state and the success / failure status text.
            btn.disabled = true;
            setStatus("Saving...", "");
            try {
                const created = await sendVaultWrite({
                    url: API,
                    method: "POST",
                    body: payload,
                    passwordReason:
                        "Enter the vault password to save this snippet:",
                    // Flash a red error in the status line on every
                    // 403 so the user sees that the previous attempt
                    // failed even while the next password prompt is up.
                    onWrong: (msg) => setStatus(msg, "err"),
                    // Wipe the red "Wrong vault password" text when
                    // the user cancels the prompt, so the page
                    // doesn't stay on the error state.
                    onCancel: () => setStatus(""),
                });
                if (!created) {                    // user cancelled the prompt
                    btn.disabled = false;
                    return;
                }
                sessionStorage.setItem("vault.just_created", "1");
                setStatus("Saved \"" + created.title + "\". Redirecting...", "ok");
                // Brief pause so the user sees the confirmation.
                setTimeout(() => {
                    window.location.href = "/";
                }, 500);
            } catch (err) {
                setStatus("Save failed: " + err.message, "err");
                btn.disabled = false;
            }
        });

        // Populate the auto-suggest list on page load.
        loadTagSuggestions();

        /**
         * Fetch the registered Tools/Stacks from the server and
         * rebuild the <select id="f-tool"> option list. The
         * registry is the single source of truth — any Tool the admin
         * added via the sidebar appears here, and any Tool the admin
         * deleted disappears from here too. If the API returns an
         * empty list OR fails, the dropdown shows a single
         * disabled "No Stack or Tool Exists to Choose" entry instead
         * of falling back to a built-in default list, so the user
         * always sees exactly what's been registered.
         */
        async function loadToolOptions() {
            let names = [];
            let apiReached = false;
            try {
                const res = await fetch(API_TOOLS, {
                    headers: { "Accept": "application/json" },
                });
                if (res.ok) {
                    const data = await res.json();
                    names = Array.isArray(data && data.tools) ? data.tools : [];
                    apiReached = true;
                }
            } catch (_) {
                /* network failure -> empty-state UI */
            }

            // Rebuild the <select> while preserving the original
            // placeholder as the first child so the select stays
            // valid in markup; we replace its label dynamically to
            // match the current registry state.
            const placeholder = toolSelect.firstElementChild;
            toolSelect.innerHTML = "";
            if (placeholder) toolSelect.appendChild(placeholder);

            if (!names.length) {
                // Empty registry (or API unreachable): turn the
                // placeholder into the empty-state message, leave it
                // disabled so the user can't submit an empty form,
                // and disable the <select> entirely so it reads as
                // read-only feedback rather than an active dropdown.
                placeholder.textContent =
                    apiReached
                        ? EMPTY_REGISTRY_MESSAGE
                        : "Unable to load tools. Retry later.";
                placeholder.disabled = true;
                placeholder.selected = true;
                toolSelect.disabled = true;
                return;
            }

            toolSelect.disabled = false;
            placeholder.textContent = "Select a tool\u2026";
            placeholder.disabled = true;
            placeholder.selected = true;

            for (const name of names) {
                const opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                toolSelect.appendChild(opt);
            }
        }

        loadToolOptions();
    })();
    </script>
</body>
</html>
